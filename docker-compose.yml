services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmacy_saas_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pharmacy_saas
    ports:
      - "5433:5432"
    volumes:
      - pharmacy_saas_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pharmacy_saas_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pharmacy_saas_postgres_data: